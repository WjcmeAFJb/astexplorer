<!DOCTYPE html>
<html>
  <head>
    <title>AST explorer</title>
    <meta charset="UTF-8">
    <meta name="description" content="An online AST explorer.">
    <link rel="icon" href="/favicon.png" />
    <script defer data-domain="astexplorer.net" src="https://plausible.astexplorer.net/js/script.js"></script>
  </head>
  <body>
    <div id="page">
      <div id="container"></div>
      <div id="contribution">
        Built with
        <a href="https://reactjs.org/">React</a>,
        <a href="https://babeljs.io/">Babel</a>,
        <a href="https://fontawesome.com/">Font Awesome</a>,
        <a href="https://microsoft.github.io/monaco-editor/">Monaco Editor</a>,
        <a href="https://expressjs.com/">Express</a>,
        and
        <a href="https://vitejs.dev/">Vite</a>
        |
        <a href="https://github.com/fkling/astexplorer">GitHub</a>
        |
        <span>@@COMMIT@@</span>
      </div>
    </div>
    <script>
      // Global shims for Node.js APIs used by parser dependencies
      if (typeof process === 'undefined') {
        window.process = { env: {}, version: '', platform: 'browser', argv: [], cwd: function() { return '/'; }, nextTick: function(f) { Promise.resolve().then(f); } };
      }
      if (typeof global === 'undefined') window.global = window;
    </script>
    <script type="module" src="/src/app.tsx"></script>
  </body>
</html>
